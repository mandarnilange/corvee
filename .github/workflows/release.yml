name: Release

# Triggered by pushing a v* tag (e.g. `git tag v1.0.0 && git push --tags`).
# Builds cross-platform binaries, packages the publishable skill
# tarball, and creates a GitHub Release with all artifacts attached.
#
# Security: only repository contents and the tag name (github.ref_name)
# are consumed. Both are repository-controlled (not user-input);
# every shell variable is passed via env: rather than direct ${{ }}
# interpolation per the GitHub Actions security guide.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: "1.26"

jobs:
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build binary
        run: |
          mkdir -p bin
          go build -ldflags "-X github.com/mandarnilange/corvee/internal/domain.Version=$VERSION" \
            -o "bin/corvee-${GOOS}-${GOARCH}" \
            ./cmd/corvee
      - name: Compute SHA-256
        run: |
          cd bin
          shasum -a 256 "corvee-${GOOS}-${GOARCH}" > "corvee-${GOOS}-${GOARCH}.sha256"
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: corvee-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            bin/corvee-${{ matrix.goos }}-${{ matrix.goarch }}
            bin/corvee-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
          if-no-files-found: error

  skill-tarball:
    name: Skill tarball (docs only)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Tarball
        run: |
          mkdir -p dist
          tar -C skills -czf "dist/corvee-skill-${VERSION}.tar.gz" corvee
      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: skill-tarball
          path: dist/corvee-skill-*.tar.gz
          if-no-files-found: error

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build, skill-tarball]
    env:
      VERSION: ${{ github.ref_name }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Stage release assets
        run: |
          mkdir -p dist
          cp artifacts/corvee-linux-amd64/corvee-linux-amd64           dist/
          cp artifacts/corvee-linux-amd64/corvee-linux-amd64.sha256    dist/
          cp artifacts/corvee-linux-arm64/corvee-linux-arm64           dist/
          cp artifacts/corvee-linux-arm64/corvee-linux-arm64.sha256    dist/
          cp artifacts/corvee-darwin-arm64/corvee-darwin-arm64         dist/
          cp artifacts/corvee-darwin-arm64/corvee-darwin-arm64.sha256  dist/
          cp artifacts/skill-tarball/corvee-skill-*.tar.gz dist/
          ls -la dist/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/corvee-linux-amd64
            dist/corvee-linux-amd64.sha256
            dist/corvee-linux-arm64
            dist/corvee-linux-arm64.sha256
            dist/corvee-darwin-arm64
            dist/corvee-darwin-arm64.sha256
            dist/corvee-skill-*.tar.gz
